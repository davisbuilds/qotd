version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # pnpm 11's default supply-chain policy (minimumReleaseAge 24h) rejects
    # packages younger than a day; without a cooldown Dependabot bumps to
    # versions the moment they publish and CI fails the lockfile check.
    cooldown:
      default-days: 2
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
